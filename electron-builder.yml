appId: dev.roy.puppetmaster
productName: Puppet Master
npmRebuild: false            # 선빌드(rebuild:electron)가 electron ABI를 준비 — 기본 rebuild는 CXXFLAGS 미주입으로 실패
directories:
  output: release
files:
  - dist/**
  - package.json
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/tree-sitter/**"
  - "**/node_modules/tree-sitter-*/**"
  - "node_modules/@typescript/**"   # tsgo 네이티브 바이너리 — asar 안에서 실행 불가
  - "node_modules/typescript/**"    # tsgo가 참조할 수 있는 lib 배치 일관성
  - "node_modules/pyright/**"       # ELECTRON_RUN_AS_NODE 스폰 대상 스크립트
  - "node_modules/typescript-language-server/**"  # 정식 tsserver LSP — ELECTRON_RUN_AS_NODE 스폰
  - "node_modules/typescript-classic/**"          # tsserver.js(클래식 TS) — node로 로드
  - "node_modules/node-pty/**"      # 네이티브 .node + prebuilds/spawn-helper — asar 안에서 실행 불가
# electron-builder는 node_modules의 *.d.ts를 기본 제거하지만(excludedExts), tsgo는 tsc
# 바이너리 옆 lib/*.d.ts(표준 라이브러리)를 런타임에 읽어야 한다 — 없으면 기동 즉시 panic.
# asar 패킹 이후 복사되는 extraResources로 unpacked lib 디렉터리에 그대로 되살린다.
# 클래식 tsserver(typescript-classic)도 동일 — lib/lib.*.d.ts가 없으면 표준 타입을 못 찾아
# "Cannot find global type" 등으로 전체가 깨진다. asarUnpack만으론 제거 단계 전이라 못 살린다.
extraResources:
  - from: build/image-original.png       # About 패널 이미지 (process.resourcesPath에서 로드)
    to: image-original.png
  - from: "node_modules/@typescript"
    to: "app.asar.unpacked/node_modules/@typescript"
    filter: ["**/*.d.ts"]
  - from: "node_modules/typescript-classic/lib"
    to: "app.asar.unpacked/node_modules/typescript-classic/lib"
    filter: ["**/*.d.ts"]
mac:
  target: [dir, dmg, zip]
  identity: null
  category: public.app-category.developer-tools
  icon: build/icon.icns
